  <circle class="flow-num" cx="1130" cy="337" r="14"/>
  <text class="flow-text" x="1127" y="341">1</text>
  <circle class="flow-num" cx="1216" cy="461" r="14"/>
  <text class="flow-text" x="1213" y="465">2</text>
  <circle class="flow-num" cx="1396" cy="461" r="14"/>
  <text class="flow-text" x="1393" y="465">3</text>
  <circle class="flow-num" cx="1478" cy="948" r="14"/>
  <text class="flow-text" x="1475" y="952">4</text>
  <circle class="flow-num" cx="1074" cy="948" r="14"/>
  <text class="flow-text" x="1071" y="952">5</text>

  <rect class="box" x="1210" y="52" width="300" height="88"/>
  <text class="h3" x="1230" y="77">Legend</text>
  <line class="arrow-blue" x1="1230" y1="98" x2="1288" y2="98"/>
  <text class="small" x="1300" y="102">HTTP control/API calls</text>
  <line class="arrow-green" x1="1230" y1="120" x2="1288" y2="120"/>
  <text class="small" x="1300" y="124">block data path</text>

  <text class="tiny" x="60" y="1090">Generated from README.md, docker-compose.yml, cmd/* services, pkg/storage, and pkg/nbd. File: docs/system-architecture.svg</text>
</svg>
