<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="920" viewBox="0 0 1500 920" role="img" aria-labelledby="title desc">
  <title id="title">Orca Blocks node virtualization architecture</title>
  <desc id="desc">Diagram centered on the node. Inside the node are Firecracker VM, NBD volume, NBD service, and node blocks/local cache. Outside the node are build image input and MinIO. The NBD service talks to node blocks and MinIO.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .title { font-family: Arial; font-size: 34px; font-weight: 700; fill: #17202e; }
      .subtitle { font-family: Arial; font-size: 15px; font-weight: 500; fill: #566579; }
      .node { fill: #f0f8f2; stroke: #8eb99a; stroke-width: 2.4; rx: 18; }
      .external { fill: #ffffff; stroke: #c8d2df; stroke-width: 2; rx: 14; }
      .box-blue { fill: #e7f2ff; stroke: #6c9fd0; stroke-width: 1.9; rx: 10; }
      .box-green { fill: #e7f5eb; stroke: #78ab84; stroke-width: 1.9; rx: 10; }
      .box-orange { fill: #fff0d9; stroke: #c58b42; stroke-width: 1.9; rx: 10; }
      .box-red { fill: #fff0ef; stroke: #c97970; stroke-width: 1.9; rx: 10; }
      .box-gray { fill: #f2f5f8; stroke: #9aa7b7; stroke-width: 1.9; rx: 10; }
      .box-white { fill: #ffffff; stroke: #8493a6; stroke-width: 1.9; rx: 10; }
      .h2 { font-family: Arial; font-size: 22px; font-weight: 700; fill: #203047; }
      .h3 { font-family: Arial; font-size: 18px; font-weight: 700; fill: #243247; }
      .small { font-family: Arial; font-size: 13px; font-weight: 500; fill: #5a687b; }
      .tiny { font-family: Arial; font-size: 11px; font-weight: 500; fill: #68778b; }
      .mono { font-family: monospace; font-size: 12px; font-weight: 600; fill: #4d5a6c; }
      .label { font-family: Arial; font-size: 12px; font-weight: 700; fill: #4f5f72; }
    </style>
  </defs>

  <rect class="bg" width="1500" height="920"/>
  <text class="title" x="56" y="66">Orca Blocks Node Virtualization Architecture</text>
  <text class="subtitle" x="56" y="96">The node owns the virtualization path: Firecracker VM uses an NBD volume, NBD service resolves blocks, and durable chunks live in MinIO outside the node.</text>

  <!-- External build path -->
  <rect class="external" x="56" y="136" width="430" height="196"/>
  <text class="h2" x="84" y="174">Build Image</text>
  <rect class="box-orange" x="96" y="206" width="350" height="92"/>
  <text class="h3" x="124" y="236">base-image-service</text>
  <text class="small" x="124" y="260">imports Docker rootfs</text>
  <text class="small" x="124" y="282">creates a base rootfs volume snapshot</text>

  <!-- Main node boundary -->
  <rect class="node" x="536" y="136" width="908" height="660"/>
  <text class="h2" x="568" y="174">Node</text>
  <text class="small" x="630" y="174">privileged container with /dev/nbd*, /dev/kvm, /cache, and /sessions</text>

  <!-- Firecracker side -->
  <rect class="box-red" x="596" y="232" width="302" height="164"/>
  <text class="h3" x="626" y="264">Firecracker VM</text>
  <text class="small" x="626" y="292">guest workload runs here</text>
  <text class="small" x="626" y="316">sees the Orca volume as a disk</text>
  <text class="mono" x="626" y="342">/dev/vda or /dev/vdb</text>
  <text class="small" x="626" y="368">initramfs, rootfs, image-rootfs, TTY</text>

  <!-- NBD volume as central block device -->
  <rect class="box-blue" x="988" y="284" width="310" height="178"/>
  <text class="h3" x="1018" y="316">NBD volume</text>
  <text class="small" x="1018" y="344">host block device attached to session</text>
  <text class="mono" x="1018" y="370">/dev/nbd0..15</text>
  <text class="small" x="1018" y="396">attached as Firecracker disk</text>
  <text class="small" x="1018" y="422">backed by NBD service export</text>

  <!-- NBD service and local blocks -->
  <rect class="box-green" x="988" y="520" width="310" height="150"/>
  <text class="h3" x="1018" y="552">NBD service</text>
  <text class="small" x="1018" y="580">session export registry</text>
  <text class="small" x="1018" y="604">ReadAt, WriteAt, Flush, Disconnect</text>
  <text class="small" x="1018" y="628">lazy block resolution and commit</text>
  <text class="mono" x="1018" y="654">NBD_ADDR=:10809</text>

  <rect class="box-gray" x="988" y="706" width="310" height="64"/>
  <text class="h3" x="1018" y="734">node blocks</text>
  <text class="small" x="1018" y="756">local cache and dirty overlays</text>

  <!-- External MinIO -->
  <rect class="external" x="56" y="548" width="430" height="198"/>
  <text class="h2" x="84" y="586">MinIO</text>
  <rect class="box-green" x="96" y="618" width="350" height="92"/>
  <text class="h3" x="124" y="648">durable block store</text>
  <text class="mono" x="124" y="672">chunks/{sha256}</text>
  <text class="mono" x="124" y="696">manifests/{snapshot_id}.json</text>

  <!-- VM to volume -->
  <line x1="898" y1="314" x2="988" y2="314" stroke="#c15f55" stroke-width="2.7"/>
  <polygon points="978,307 978,321 992,314" fill="#c15f55"/>
  <text class="label" x="922" y="298">block disk</text>

  <!-- NBD volume to service -->
  <line x1="1143" y1="462" x2="1143" y2="520" stroke="#3f8a52" stroke-width="2.8"/>
  <polygon points="1136,510 1150,510 1143,524" fill="#3f8a52"/>
  <text class="label" x="1160" y="500">NBD protocol</text>

  <!-- Service to local blocks -->
  <line x1="1143" y1="670" x2="1143" y2="706" stroke="#50637a" stroke-width="2.5"/>
  <polygon points="1136,696 1150,696 1143,710" fill="#50637a"/>
  <line x1="1184" y1="706" x2="1184" y2="670" stroke="#50637a" stroke-width="2.5"/>
  <polygon points="1177,680 1191,680 1184,666" fill="#50637a"/>
  <text class="label" x="1200" y="692">cache / dirty writes</text>

  <!-- Service to MinIO outside node -->
  <line x1="988" y1="650" x2="940" y2="650" stroke="#3f8a52" stroke-width="2.8"/>
  <line x1="940" y1="650" x2="940" y2="690" stroke="#3f8a52" stroke-width="2.8"/>
  <line x1="940" y1="690" x2="486" y2="690" stroke="#3f8a52" stroke-width="2.8"/>
  <polygon points="496,683 496,697 482,690" fill="#3f8a52"/>
  <polygon points="978,643 978,657 992,650" fill="#3f8a52"/>
  <text class="label" x="632" y="674">fetch/upload chunks + manifests</text>

  <!-- Build image imports rootfs chunks and manifest into durable storage -->
  <line x1="272" y1="332" x2="272" y2="548" stroke="#b77925" stroke-width="2.6"/>
  <polygon points="265,538 279,538 272,552" fill="#b77925"/>
  <text class="label" x="292" y="442">imports rootfs chunks + manifest</text>

  <!-- Internal note -->
  <rect class="box-white" x="596" y="196" width="702" height="1" opacity="0"/>
  <text class="tiny" x="568" y="778">Inside the node, Firecracker consumes the NBD volume path. The NBD service bridges block-device reads/writes to node-local blocks and MinIO.</text>
  <text class="tiny" x="56" y="858">Generated from cmd/node-service, cmd/base-image-service, pkg/nbd, and pkg/storage. File: docs/system-architecture.svg</text>
</svg>
