<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1080" viewBox="0 0 1500 1080" role="img" aria-labelledby="title desc">
  <title id="title">Orca Blocks system architecture</title>
  <desc id="desc">Clean architecture diagram of Orca Blocks showing entry points, control services, execution nodes, storage internals, Postgres metadata, Toxiproxy, MinIO object storage, and the lazy block path.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .title { font-family: Arial; font-size: 34px; font-weight: 700; fill: #17202e; }
      .subtitle { font-family: Arial; font-size: 15px; font-weight: 500; fill: #566579; }
      .section { fill: #ffffff; stroke: #c8d2df; stroke-width: 2; rx: 12; }
      .section-blue { fill: #eef6ff; stroke: #acc8e5; stroke-width: 2; rx: 12; }
      .section-green { fill: #f0f8f2; stroke: #b0d1b8; stroke-width: 2; rx: 12; }
      .section-warm { fill: #fff8ef; stroke: #dfbf8f; stroke-width: 2; rx: 12; }
      .box { fill: #ffffff; stroke: #8493a6; stroke-width: 1.7; rx: 8; }
      .box-blue { fill: #e7f2ff; stroke: #6c9fd0; stroke-width: 1.7; rx: 8; }
      .box-green { fill: #e8f5eb; stroke: #78ab84; stroke-width: 1.7; rx: 8; }
      .box-orange { fill: #fff0d9; stroke: #c58b42; stroke-width: 1.7; rx: 8; }
      .box-red { fill: #fff0ef; stroke: #c97970; stroke-width: 1.7; rx: 8; }
      .box-gray { fill: #f2f5f8; stroke: #9aa7b7; stroke-width: 1.7; rx: 8; }
      .h2 { font-family: Arial; font-size: 18px; font-weight: 700; fill: #203047; }
      .h3 { font-family: Arial; font-size: 15px; font-weight: 700; fill: #243247; }
      .small { font-family: Arial; font-size: 12px; font-weight: 500; fill: #5a687b; }
      .tiny { font-family: Arial; font-size: 10.5px; font-weight: 500; fill: #68778b; }
      .mono { font-family: monospace; font-size: 11px; font-weight: 600; fill: #4d5a6c; }
      .arrow { fill: none; stroke: #50637a; stroke-width: 2.1; marker-end: url(#arrow); }
      .arrow-blue { fill: none; stroke: #266fac; stroke-width: 2.3; marker-end: url(#arrow-blue); }
      .arrow-green { fill: none; stroke: #3f8a52; stroke-width: 2.3; marker-end: url(#arrow-green); }
      .arrow-orange { fill: none; stroke: #b77925; stroke-width: 2.3; marker-end: url(#arrow-orange); }
      .arrow-dashed { fill: none; stroke: #8290a3; stroke-width: 1.8; stroke-dasharray: 7 6; marker-end: url(#arrow-soft); }
      .badge { fill: #246faa; stroke: #ffffff; stroke-width: 2; }
      .badge-text { font-family: Arial; font-size: 11px; font-weight: 700; fill: #ffffff; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#50637a"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#266fac"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#3f8a52"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#b77925"/>
    </marker>
    <marker id="arrow-soft" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#8290a3"/>
    </marker>
  </defs>

  <rect class="bg" width="1500" height="1080"/>
  <text class="title" x="54" y="64">Orca Blocks System Architecture</text>
  <text class="subtitle" x="54" y="92">Compose MVP for lazy block volumes, node-local caches, image-rootfs environments, NBD devices, and Firecracker sessions.</text>

  <!-- Entry points -->
  <rect class="section-blue" x="54" y="132" width="1392" height="128"/>
  <text class="h2" x="80" y="166">Entry Points</text>
  <rect class="box-blue" x="102" y="188" width="250" height="50"/>
  <text class="h3" x="124" y="210">HTTP/API caller</text>
  <text class="small" x="124" y="229">volumes, sessions, envs</text>
  <rect class="box-blue" x="444" y="188" width="250" height="50"/>
  <text class="h3" x="466" y="210">Sandbox UI</text>
  <text class="small" x="466" y="229">build, start/resume, TTY</text>
  <rect class="box" x="786" y="188" width="250" height="50"/>
  <text class="h3" x="808" y="210">NBD client</text>
  <text class="small" x="808" y="229">test export or node-owned attach</text>
  <rect class="box" x="1128" y="188" width="250" height="50"/>
  <text class="h3" x="1150" y="210">Firecracker guest</text>
  <text class="small" x="1150" y="229">reads/writes virtual block device</text>

  <!-- Control services -->
  <rect class="section" x="54" y="318" width="1392" height="170"/>
  <text class="h2" x="80" y="352">Control Services</text>
  <rect class="box-blue" x="258" y="380" width="314" height="76"/>
  <text class="h3" x="280" y="404">control-service</text>
  <text class="small" x="280" y="426">schedules sessions, creates envs</text>
  <text class="mono" x="280" y="445">:18080 -&gt; :8080</text>
  <rect class="box-orange" x="928" y="380" width="314" height="76"/>
  <text class="h3" x="950" y="404">base-image-service</text>
  <text class="small" x="950" y="426">imports Docker rootfs as snapshot</text>
  <text class="mono" x="950" y="445">:18083 -&gt; :8080</text>

  <!-- Execution layer -->
  <rect class="section-green" x="54" y="546" width="1392" height="270"/>
  <text class="h2" x="80" y="580">Execution Nodes</text>
  <rect class="box-green" x="96" y="610" width="230" height="150"/>
  <text class="h3" x="118" y="634">node-1</text>
  <text class="mono" x="118" y="654">HTTP :18081</text>
  <text class="mono" x="118" y="673">NBD  :11081</text>
  <text class="small" x="118" y="697">/dev/nbd0..7</text>
  <text class="small" x="118" y="716">/cache + /sessions</text>
  <text class="small" x="118" y="735">Firecracker assets mounted</text>
  <rect class="box-green" x="1174" y="610" width="230" height="150"/>
  <text class="h3" x="1196" y="634">node-2</text>
  <text class="mono" x="1196" y="654">HTTP :18082</text>
  <text class="mono" x="1196" y="673">NBD  :11082</text>
  <text class="small" x="1196" y="697">/dev/nbd8..15</text>
  <text class="small" x="1196" y="716">/cache + /sessions</text>
  <text class="small" x="1196" y="735">Firecracker assets mounted</text>

  <rect class="box-blue" x="398" y="602" width="210" height="70"/>
  <text class="h3" x="420" y="626">HTTP block API</text>
  <text class="small" x="420" y="648">read, write, commit, stop</text>
  <rect class="box-orange" x="398" y="700" width="210" height="70"/>
  <text class="h3" x="420" y="724">NBD server</text>
  <text class="small" x="420" y="746">session exports</text>

  <rect class="box-green" x="662" y="610" width="246" height="150"/>
  <text class="h3" x="684" y="634">pkg/storage.Backend</text>
  <text class="small" x="684" y="656">sessions and manifests</text>
  <text class="small" x="684" y="675">lazy chunk resolve</text>
  <text class="small" x="684" y="694">dirty overlay writes</text>
  <text class="small" x="684" y="713">bounded commit batches</text>
  <text class="small" x="684" y="732">cache fill and eviction</text>

  <rect class="box-red" x="962" y="602" width="210" height="70"/>
  <text class="h3" x="984" y="626">Mounted FS</text>
  <text class="small" x="984" y="648">/dev/nbdX + ext4 mount</text>
  <rect class="box-red" x="962" y="700" width="210" height="70"/>
  <text class="h3" x="984" y="724">Firecracker</text>
  <text class="small" x="984" y="746">initramfs/rootfs/TTY modes</text>

  <!-- Persistence -->
  <rect class="section-warm" x="54" y="928" width="1392" height="104"/>
  <text class="h2" x="80" y="962">Persistence</text>
  <rect class="box-orange" x="108" y="980" width="280" height="34"/>
  <text class="h3" x="130" y="1002">Postgres metadata</text>
  <rect class="box-gray" x="472" y="980" width="250" height="34"/>
  <text class="h3" x="494" y="1002">Toxiproxy S3 path</text>
  <rect class="box-green" x="806" y="980" width="280" height="34"/>
  <text class="h3" x="828" y="1002">MinIO object store</text>
  <rect class="box-gray" x="1170" y="980" width="220" height="34"/>
  <text class="h3" x="1192" y="1002">Node local cache</text>

  <!-- Main system arrows: simple polylines plus explicit arrowheads for portable rendering -->
  <line x1="415" y1="260" x2="415" y2="380" stroke="#266fac" stroke-width="2.3"/>
  <polygon points="410,373 420,373 415,382" fill="#266fac"/>

  <line x1="572" y1="418" x2="928" y2="418" stroke="#b77925" stroke-width="2.3"/>
  <polygon points="920,413 920,423 930,418" fill="#b77925"/>

  <line x1="415" y1="456" x2="415" y2="570" stroke="#266fac" stroke-width="2.3"/>
  <line x1="415" y1="570" x2="503" y2="570" stroke="#266fac" stroke-width="2.3"/>
  <line x1="503" y1="570" x2="503" y2="602" stroke="#266fac" stroke-width="2.3"/>
  <polygon points="498,595 508,595 503,604" fill="#266fac"/>

  <line x1="608" y1="637" x2="662" y2="637" stroke="#3f8a52" stroke-width="2.3"/>
  <polygon points="654,632 654,642 664,637" fill="#3f8a52"/>
  <line x1="608" y1="735" x2="662" y2="735" stroke="#3f8a52" stroke-width="2.3"/>
  <polygon points="654,730 654,740 664,735" fill="#3f8a52"/>
  <line x1="908" y1="637" x2="962" y2="637" stroke="#3f8a52" stroke-width="2.3"/>
  <polygon points="954,632 954,642 964,637" fill="#3f8a52"/>
  <line x1="908" y1="735" x2="962" y2="735" stroke="#3f8a52" stroke-width="2.3"/>
  <polygon points="954,730 954,740 964,735" fill="#3f8a52"/>

  <!-- Lazy block path detail -->
  <text class="h2" x="54" y="852">Lazy Block Path Inside a Node</text>
  <rect class="box-blue" x="258" y="868" width="178" height="46"/>
  <text class="h3" x="280" y="896">Read/write request</text>
  <rect class="box-gray" x="480" y="868" width="178" height="46"/>
  <text class="h3" x="502" y="896">Dirty overlay</text>
  <rect class="box-gray" x="702" y="868" width="178" height="46"/>
  <text class="h3" x="724" y="896">Local cache</text>
  <rect class="box-green" x="924" y="868" width="178" height="46"/>
  <text class="h3" x="946" y="896">MinIO chunk</text>
  <rect class="box-orange" x="1146" y="868" width="178" height="46"/>
  <text class="h3" x="1168" y="896">Commit manifest</text>
  <line x1="436" y1="891" x2="480" y2="891" stroke="#3f8a52" stroke-width="2.3"/>
  <polygon points="472,886 472,896 482,891" fill="#3f8a52"/>
  <line x1="658" y1="891" x2="702" y2="891" stroke="#3f8a52" stroke-width="2.3"/>
  <polygon points="694,886 694,896 704,891" fill="#3f8a52"/>
  <line x1="880" y1="891" x2="924" y2="891" stroke="#3f8a52" stroke-width="2.3"/>
  <polygon points="916,886 916,896 926,891" fill="#3f8a52"/>
  <line x1="1102" y1="891" x2="1146" y2="891" stroke="#3f8a52" stroke-width="2.3"/>
  <polygon points="1138,886 1138,896 1148,891" fill="#3f8a52"/>
  <circle class="badge" cx="458" cy="891" r="13"/><text class="badge-text" x="455" y="895">1</text>
  <circle class="badge" cx="680" cy="891" r="13"/><text class="badge-text" x="677" y="895">2</text>
  <circle class="badge" cx="902" cy="891" r="13"/><text class="badge-text" x="899" y="895">3</text>
  <circle class="badge" cx="1124" cy="891" r="13"/><text class="badge-text" x="1121" y="895">4</text>

  <text class="tiny" x="130" y="1024">Postgres stores volumes, snapshots, base images, envs, and last_node hints.</text>
  <text class="tiny" x="828" y="1024">MinIO stores chunks/{sha256} and manifests/{snapshot_id}.json.</text>
  <text class="tiny" x="54" y="1062">Generated from README.md, docker-compose.yml, cmd/* services, pkg/storage, and pkg/nbd. File: docs/system-architecture.svg</text>
</svg>
