services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: orca
      POSTGRES_PASSWORD: orca
      POSTGRES_DB: orca
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orca -d orca"]
      interval: 2s
      timeout: 2s
      retries: 30

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "19002:9000"
      - "19001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/ready"]
      interval: 2s
      timeout: 2s
      retries: 30

  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:latest
    ports:
      - "18474:8474"
      - "19000:9000"
    depends_on:
      minio:
        condition: service_healthy

  toxiproxy-init:
    image: curlimages/curl:8.16.0
    depends_on:
      toxiproxy:
        condition: service_started
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until curl -fsS http://toxiproxy:8474/proxies >/dev/null; do sleep 1; done &&
      curl -sS -X DELETE http://toxiproxy:8474/proxies/minio-s3 >/dev/null || true &&
      curl -fsS -X POST http://toxiproxy:8474/proxies -H 'content-type: application/json' -d '{\"name\":\"minio-s3\",\"listen\":\"0.0.0.0:9000\",\"upstream\":\"minio:9000\"}' &&
      curl -fsS -X POST http://toxiproxy:8474/proxies/minio-s3/toxics -H 'content-type: application/json' -d '{\"name\":\"minio-downstream-latency\",\"type\":\"latency\",\"stream\":\"downstream\",\"toxicity\":1,\"attributes\":{\"latency\":20,\"jitter\":0}}' &&
      curl -fsS -X POST http://toxiproxy:8474/proxies/minio-s3/toxics -H 'content-type: application/json' -d '{\"name\":\"minio-downstream-bandwidth\",\"type\":\"bandwidth\",\"stream\":\"downstream\",\"toxicity\":1,\"attributes\":{\"rate\":1250}}'
      "

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/orca-blocks || true
      "

  control-service:
    build:
      context: .
      args:
        TARGET: ./cmd/control-service
    environment:
      DATABASE_URL: postgres://orca:orca@postgres:5432/orca?sslmode=disable
      NODE_1_URL: http://node-1:8080
      NODE_2_URL: http://node-2:8080
      NODE_1_PUBLIC_URL: http://localhost:18081
      NODE_2_PUBLIC_URL: http://localhost:18082
      PORT: "8080"
    ports:
      - "18080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      node-1:
        condition: service_healthy
      node-2:
        condition: service_healthy

  node-1:
    build:
      context: .
      args:
        TARGET: ./cmd/node-service
    environment:
      NODE_ID: node-1
      DATABASE_URL: postgres://orca:orca@postgres:5432/orca?sslmode=disable
      S3_ENDPOINT: http://toxiproxy:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: orca-blocks
      CACHE_DIR: /cache
      CACHE_MAX_BYTES: "67108864"
      PORT: "8080"
      NBD_ADDR: :10809
      NBD_PUBLIC_ADDR: localhost:11081
      NBD_COMMIT_BATCH_CHUNKS: "16"
    ports:
      - "18081:8080"
      - "11081:10809"
    privileged: true
    volumes:
      - node-1-cache:/cache
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      toxiproxy-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 2s
      timeout: 2s
      retries: 30

  node-2:
    build:
      context: .
      args:
        TARGET: ./cmd/node-service
    environment:
      NODE_ID: node-2
      DATABASE_URL: postgres://orca:orca@postgres:5432/orca?sslmode=disable
      S3_ENDPOINT: http://toxiproxy:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: orca-blocks
      CACHE_DIR: /cache
      CACHE_MAX_BYTES: "67108864"
      PORT: "8080"
      NBD_ADDR: :10809
      NBD_PUBLIC_ADDR: localhost:11082
      NBD_COMMIT_BATCH_CHUNKS: "16"
    ports:
      - "18082:8080"
      - "11082:10809"
    privileged: true
    volumes:
      - node-2-cache:/cache
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      toxiproxy-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 2s
      timeout: 2s
      retries: 30

volumes:
  postgres-data:
  minio-data:
  node-1-cache:
  node-2-cache:
